    (function () {

        Object.defineProperty(window, 'markmap', {
            configurable: true,
            get() { return _orig; },
            set(val) {
                _orig = val;
                if (val && val.Markmap && !val.Markmap.__patched) {
                    const origCreate = val.Markmap.create;
                    val.Markmap.create = function (svg, opts, data) {
                        opts = opts || {};
                        opts.scrollForPan = false;
                        const mm = origCreate.call(val.Markmap, svg, opts, data);

                    };
                    val.Markmap.__patched = true;
                }
            }
        });
        window._getMM = () => _mm;

<script type="text/template">

# Giảm Tiểu Cầu
## 1. ĐẠI CƯƠNG TIỂU CẦU
### 1.1. Nguồn gốc
- Sinh ra từ **Mẫu tiểu cầu** (Megakaryocyte) ở tủy xương
- Phát triển nhờ **Thrombopoietin (TPO)**, IL-3, IL-6, IL-11
### 1.2. Cấu trúc
- Hình dĩa, không nhân, đường kính **2-3 μm**
- Đời sống: **7-10 ngày**
- SL bình thường: **150 - 450 × 10⁹/L**
### 1.3. Hạt trong tiểu cầu
- **Hạt alpha (α):** chứa yếu tố V, vWF, Fibrinogen, PDGF, TGF-β, PF4
- **Hạt đặc (Dense):** chứa ADP, ATP, Serotonin, Canxi
- **Hạt lysosome:** enzyme acid hydrolase
### 1.4. Chức năng
- Cầm máu kỳ đầu:
  + **Kết dính**: vWF gắn GPIb/IX/V
  + **Hoạt hóa**: đổi hình, phóng hạt
  + **Kết tập**: Fibrinogen gắn GPIIb/IIIa

## 2. NGUYÊN NHÂN
### 2.1. Giảm sản xuất tại tủy
- Bẩm sinh: Wiskott-Aldrich, Hội chứng TAR, Bernard-Soulier
- Bệnh ác tính: Bạch cầu cấp (Leukemia), Neuroblastoma
- Suy tủy (Aplastic anemia): Fanconi, mắc phải
- Dinh dưỡng: Thiếu Vitamin B12, Folic, Sắt nặng
- Nhiễm trùng: Rubella sơ sinh, CMV, HIV, EBV
### 2.2. Tăng phá hủy ngoại biên
- **Miễn dịch:**
  + ITP (Giảm TC miễn dịch)
  + Hội chứng Evans (ITP + Thiếu máu tán huyết tự miễn)
  + Lupus (SLE), ALPS
  + Thuốc: Heparin (HIT)
- **Tiêu thụ tăng (vi huyết khối):**
  + DIC (Đông máu nội mạch rải rác)
  + HUS (HC Ure máu cao tán huyết)
  + TTP (Ban xuất huyết TC huyết khối)
  + HC Kasabach-Merritt
### 2.3. Bất thường phân bố
- Cường lách (Hypersplenism)
- Xơ gan (Tăng áp tĩnh mạch cửa)

## 3. GIẢM TC MIỄN DỊCH (ITP)
### 3.1. Tổng quan & Sinh lý bệnh
- Giảm TC **< 100 × 10⁹/L** do kháng thể (IgG)
- Đỉnh mắc: **2 - 5 tuổi**, 80% tự hồi phục
- Kháng thể gắn lên màng TC → tiêu hủy tại lách bởi đại thực bào
- Kháng thể ức chế mẫu tiểu cầu → rối loạn sinh TC tại tủy
### 3.2. Phân loại theo thời gian
- **Mới mắc**: < 3 tháng
- **Kéo dài**: 3 - 12 tháng
- **Mạn tính**: > 12 tháng
### 3.3. Lâm sàng
- Xuất huyết da: mảng bầm, chấm, **không đau**
- Xuất huyết niêm mạc (ước): mũi, lợi, rong kinh
- Xuất huyết nội sọ (<1%): nhức đầu, nôn, co giật
- **Lưu ý:** Thường **không có** gan/lách to, sốt
### 3.4. Phân độ Buchanan & Adix
- **Độ 0:** Không có
- **Độ 1 (rất nhẹ):** ≤ 100 chấm hoăc ≤ 5 mảng bầm (kính ≤ 3cm)
- **Độ 2 (nhẹ):** > 100 chấm hoặc > 5 mảng lớn
- **Độ 3a (TB can thiệp thấp):** chảy máu niêm mạc mũi < 5 phút
- **Độ 3b (TB can thiệp cao):** chảy máu mũi > 5 phút, miệng đau
- **Độ 4 (Nặng):** nguy cơ xuất huyết nội tạng
- **Độ 5 (Đe dọa mạng):** Xuất huyết nội sọ/nội tạng đa cơ quan
### 3.5. Cận lâm sàng & Chẩn đoán
- **Huyết đồ:** BC, HC bình thường. TC < 100 × 10⁹/L
- **Phết máu:** TC to, không tế bào non
- **Tủy đồ (Không thường quy):** Chỉ làm khi LS bất thường (gan lách to), không đáp ứng điều trị, hoặc trước khi uống Corticoid kéo dài
- **Chẩn đoán phân biệt:** 
  + Suy tủy (giảm 3 dòng)
  + Bạch cầu cấp (BC non, sốt)
  + HC Evans (Coombs D+)

## 4. ĐIỀU TRỊ ITP
### 4.1. Điều trị mới mắc
- **Độ 0 - 3a:** "Theo dõi và chờ đợi" (không thuốc)
- **Độ 3b - 4:** 
  + Corticosteroid uống (Prednisone 14 ngày)
  + IVIG hoặc Anti-D tĩnh mạch
- **Độ 5 (Cấp cứu):** 
  + Truyền TC đậm đặc
  + Methylprednisolone TM liều cao
  + IVIG liều cao + Anti-D
### 4.2. Các loại thuốc
- **Corticosteroids:** Kháng viêm, ức chế ĐTB.<br>TDP: Cushing, tăng HA/Đường
- **IVIG:** Ức chế thụ thể Fc ở lách, hiệu quả **nhanh**.<br>TDP: nhức đầu, sốc nếu thiếu IgA
- **Anti-Rh(D):** "Đánh lạc hướng" ĐTB ăn HC.<br>Chỉ định: Nhóm máu Rh(+), chưa cắt lách.<br>TDP: thiếu máu tán huyết, sốt
### 4.3. ITP Mạn tính / Kháng trị
- **Rituximab (Anti-CD20):** Diệt Tế bào B sinh kháng thể
- **TPO-RA (Eltrombopag, Romiplostim):** Kích thích sinh TC tại tủy
- **Cắt lách:**
  + Chỉ định: Mãn tính (>12m), Trẻ **> 5 tuổi**, đề kháng thuốc
  + Dự phòng OPSI: Tiêm ngừa (Phế cầu, Não mô cầu, HI) **2 tuần trước** phẫu thuật

<script>
function foldNode(n,f){if(n.children&&n.children.length){n.payload=n.payload||{};n.payload.fold=f;n.children.forEach(c=>foldNode(c,f));}}
function collapseAll(){const mm=window._getMM();if(!mm)return;const r=mm.state.data;if(r&&r.children){r.children.forEach(c=>foldNode(c,1));mm.setData(r);setTimeout(()=>mm.fit(),300);}}
function expandAll(){const mm=window._getMM();if(!mm)return;foldNode(mm.state.data,0);mm.setData(mm.state.data);setTimeout(()=>mm.fit(),300);}
function fitView(){const mm=window._getMM();if(mm)mm.fit();}
</script>
