    (function () {
        let _orig = null, _mm = null;
        Object.defineProperty(window, 'markmap', {
            configurable: true,
            get() { return _orig; },
            set(val) {
                _orig = val;
                if (val && val.Markmap && !val.Markmap.__patched) {
                    const origCreate = val.Markmap.create;
                    val.Markmap.create = function (svg, opts, data) {
                        opts = opts || {};
                        opts.scrollForPan = false;
                        const mm = origCreate.call(val.Markmap, svg, opts, data);
                        _mm = mm; return mm;
                    };
                    val.Markmap.__patched = true;
                }
            }
        });
        window._getMM = () => _mm;
    })();
    </script>

# Bài 9. Chức năng tạo nước tiểu và bài xuất
TS.BS. Lê Quốc Tuấn

## MỤC TIÊU HỌC TẬP
1. Trình bày nguyên lý siêu lọc và cấu trúc màng lọc cầu thận (3 lớp).
2. Phân tích các áp suất ảnh hưởng đến độ lọc cầu thận (GFR).
3. Mô tả sự tái hấp thu và bài tiết tại các đoạn ống thận (Ống gần, Quai Henle, Ống xa, Ống góp).
4. Giải thích cơ chế cô đặc và pha loãng nước tiểu (Hệ thống ngược dòng).

## 1. QUÁ TRÌNH LỌC TẠI CẦU THẬN
Lọc là bước đầu tiên để tạo nước tiểu, xảy ra tại các tiểu cầu thận.

### 1.1 Màng lọc cầu thận (3 lớp)
1. **Lớp nội mô mao mạch**: Có các lỗ thủng (cửa sổ) lớn nhưng tích điện âm $\to$ Ngăn protein.
2. **Màng đáy**: Cấu tạo bởi Collagen và Proteoglycan tích điện âm cực mạnh $\to$ Rào cản chính đối với Albumin.
3. **Lớp tế bào có chân (Podocyte)**: Các chân giả đan xen nhau tạo khe lọc. Có cấu trúc **Nephrin** như dây kéo để lọc kích thước.

### 1.2 Độ lọc cầu thận (GFR)
- Trị số bình thường: **125 mL/phút** (180 lít/ngày).
- **Các áp suất quyết định**:
  - Áp suất thủy tĩnh mao mạch ($P_{GC} \approx 60$ mmHg): Đẩy dịch lọc ra (Động lực chính).
  - Áp suất thủy tĩnh khoang Bowman ($P_{BC} \approx 18$ mmHg): Chống lại lọc.
  - Áp suất keo mao mạch ($\pi_{GC} \approx 32$ mmHg): Hút dịch lại (Chống lại lọc).
  - Áp suất siêu lọc tịnh = $60 - (18 + 32) = 10$ mmHg.

## 2. CHỨC NĂNG CỦA ỐNG THẬN
Ống thận tái hấp thu các chất cần thiết và bài tiết các chất cặn bã.

### 2.1 Ống lượn gần (Tái hấp thu 65%)
- **Tái hấp thu**: 100% Glucose và Acid amin (qua đồng vận chuyển với Na+). 65% Na+, K+, nước và Cl-.
- **Bài tiết**: H+, các chất độc, thuốc.
- **Ngưỡng thận của Glucose**: 180 mg/dL. Nếu đường máu cao hơn, đường sẽ xuất hiện trong nước tiểu.

### 2.2 Quai Henle (Cơ chế ngược dòng)
- **Nhánh xuống**: Chỉ thấm nước, không thấm muối $\to$ Dịch ống trở nên ưu trương.
- **Nhánh lên (đoạn dày)**: Thấm muối (bơm Na-K-2Cl), không thấm nước $\to$ Dịch ống trở nên nhược trương.
- **Ý nghĩa**: Tạo độ ưu trương cho dịch kẽ tủy thận để giúp cô đặc nước tiểu ở ống góp.

### 2.3 Ống lượn xa và Ống góp
- **Aldosterone**: Tác động tại đây để tăng tái hấp thu Na+ và bài tiết K+.
- **ADH (Hormon chống bài niệu)**: Mở kênh nước (Aquaporin) tại ống góp để tái hấp thu nước $\to$ Cô đặc nước tiểu.

## 3. CÔ ĐẶC VÀ PHA LOÃNG NƯỚC TIỂU
- Khi cơ thể thiếu nước $\to$ Tuyến yên tiết **ADH** $\to$ Ống góp tái hấp thu nước tối đa $\to$ Nước tiểu ít và ưu trương.
- Khi thừa nước $\to$ Không có ADH $\to$ Ống góp không thấm nước $\to$ Nước tiểu nhiều và nhược trương (loãng).
</script>

<script>
function foldNode(n,f){if(n.children&&n.children.length){n.payload=n.payload||{};n.payload.fold=f;n.children.forEach(c=>foldNode(c,f));}}
function collapseAll(){const mm=window._getMM();if(!mm)return;const r=mm.state.data;if(r&&r.children){r.children.forEach(c=>foldNode(c,1));mm.setData(r);setTimeout(()=>mm.fit(),300);}}
function expandAll(){const mm=window._getMM();if(!mm)return;foldNode(mm.state.data,0);mm.setData(mm.state.data);setTimeout(()=>mm.fit(),300);}
function fitView(){const mm=window._getMM();if(mm)mm.fit();}
</script>
